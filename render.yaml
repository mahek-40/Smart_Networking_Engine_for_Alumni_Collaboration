# Services for Render.com deployment
# https://render.com/docs/render-yaml-reference

services:
  - type: web
    name: smart-networking-engine
    runtime: python
    region: oregon
    plan: free                    # Change to "starter" for production

    # Build: install dependencies from backend/requirements.txt
    buildCommand: "pip install -r backend/requirements.txt"

    # Start: run uvicorn from inside the backend/ folder
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend"

    # Health check path (Render pings this to confirm the service is up)
    healthCheckPath: /health

    # Environment variables — set these as "Secret" in Render dashboard
    envVars:
      - key: MONGODB_URL
        sync: false               # Must be set manually in Render dashboard (Atlas URI)
      - key: DATABASE_NAME
        value: alumni_network
      - key: JWT_SECRET_KEY
        generateValue: true       # Render auto-generates a secure secret
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: APP_VERSION
        value: "1.0.0"
      - key: ALLOWED_ORIGINS
        value: "*"                # Replace with your frontend URL after deployment
      - key: PROJECT_NAME
        value: "Smart Networking Engine for Alumni Collaboration"
